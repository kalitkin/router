name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-router
  cancel-in-progress: false

jobs:

  # ── Определяем что изменилось ──────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      bypass:   ${{ steps.filter.outputs.bypass }}
      source:   ${{ steps.filter.outputs.source }}
      keenetic: ${{ steps.filter.outputs.keenetic }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bypass:
              - 'files/bypass_ips.txt'
              - 'files/bypass_domains.txt'
            source:
              - 'files/vpn-connect.sh'
              - 'files/vpn-agent.sh'
              - 'files/vpn-apply.sh'
              - 'files/vpn-agent.init'
              - 'files/xray-fetch.init'
              - 'files/vpn.lua'
              - 'files/index.htm'
              - 'patch-ipk.sh'
              - 'Makefile'
            keenetic:
              - 'keenetic-lab/scripts/**'
              - 'files/deploy-keenetic.sh'

  # ── ShellCheck ─────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: ShellCheck — OpenWrt scripts
        run: |
          shellcheck --severity=warning \
            patch-ipk.sh \
            files/vpn-connect.sh \
            files/vpn-agent.sh \
            files/vpn-apply.sh \
            files/deploy.sh \
            files/build.sh
      - name: ShellCheck — Keenetic scripts
        run: |
          shellcheck --severity=warning \
            files/deploy-keenetic.sh \
            keenetic-lab/scripts/keenetic-connect.sh \
            keenetic-lab/scripts/keenetic-apply.sh \
            keenetic-lab/scripts/keenetic-agent.sh \
            keenetic-lab/scripts/install.sh \
            keenetic-lab/scripts/S99vpn-agent

  # ── Сборка IPK (только при изменении исходников) ───────────────────────────
  build:
    needs: detect
    if: needs.detect.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build IPK
        run: bash patch-ipk.sh "$RUNNER_TEMP/router.ipk"
      - uses: actions/upload-artifact@v4
        with:
          name: router-ipk
          path: ${{ runner.temp }}/router.ipk
          retention-days: 7

  # ── Деплой ─────────────────────────────────────────────────────────────────
  deploy:
    needs: [detect, lint, build]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.detect.outputs.bypass == 'true' || needs.detect.outputs.source == 'true' || needs.detect.outputs.keenetic == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          # Handle both real newlines and literal \n (common secret storage issue)
          printf '%s' "$SSH_KEY" | tr -d '\r' | sed 's/\\n/\n/g' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "Key lines: $(wc -l < ~/.ssh/deploy_key)"
          echo "Key bytes: $(wc -c < ~/.ssh/deploy_key)"
          echo "First line: $(head -1 ~/.ssh/deploy_key)"
          echo "Last line:  $(tail -1 ~/.ssh/deploy_key)"
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null && echo "SSH key OK" || echo "WARNING: ssh key may be malformed"
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      # Только bypass-файлы изменились → копируем их без пересборки IPK
      - name: Deploy bypass files only
        if: needs.detect.outputs.bypass == 'true' && needs.detect.outputs.source == 'false'
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'bash -s' << 'ENDSSH'
          set -e
          cd /root/router
          git pull
          cp files/bypass_ips.txt files/bypass_domains.txt /var/www/self-music.online/router/
          echo "==> Bypass lists updated"
          ENDSSH

      # Изменились исходники → пересобираем IPK, деплоим всё
      - name: Download IPK
        if: needs.detect.outputs.source == 'true'
        uses: actions/download-artifact@v4
        with:
          name: router-ipk
          path: ${{ runner.temp }}

      - name: Upload IPK to server
        if: needs.detect.outputs.source == 'true'
        run: |
          scp -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "$RUNNER_TEMP/router.ipk" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/router.ipk"

      - name: Full deploy via SSH
        if: needs.detect.outputs.source == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'bash -s' << 'ENDSSH'
          set -e
          cd /root/router
          git pull
          SKIP_XRAY_BUILD=1 bash files/deploy.sh
          ENDSSH

      # Keenetic-скрипты → деплоим в /keenetic/ + manifest
      - name: Deploy Keenetic scripts
        if: needs.detect.outputs.keenetic == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" 'bash -s' << 'ENDSSH'
          set -e
          cd /root/router
          git pull
          bash files/deploy-keenetic.sh
          ENDSSH
